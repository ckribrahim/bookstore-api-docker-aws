services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: flask_app
    env_file:
      - .env
    ports:
      - "80:80"
    networks:
      - bravosixnet
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    # Security hardening
    read_only: false
    security_opt:
      - no-new-privileges:true

  database:
    image: mysql:8.0
    container_name: mysql_db
    env_file:
      - .env
    environment:
      # These map .env vars to MySQL's expected var names
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - bravosixnet
    volumes:
      - bravosixvol:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Security hardening
    security_opt:
      - no-new-privileges:true

networks:
  bravosixnet:
    driver: bridge

volumes:
  bravosixvol:
    driver: local
